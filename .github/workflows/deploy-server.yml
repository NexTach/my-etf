name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
  workflow_dispatch:

concurrency:
  group: nxdi-server-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/nxdi
      APP_SESSION_SECRET: deploy-verification-secret-with-at-least-32-characters
      PUBLIC_APP_URL: https://nxdi.vercel.app
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Verify server
        working-directory: server
        run: npm run verify

      - name: Prepare runtime environment
        shell: bash
        env:
          SERVER_ENV: ${{ secrets.SERVER_ENV }}
        run: |
          if [[ -z "$SERVER_ENV" ]]; then
            echo "SERVER_ENV secret is required." >&2
            exit 1
          fi

          umask 077
          printf '%s\n' "$SERVER_ENV" > server/runtime.env

      - name: Deploy over SSH
        uses: 8G4B/GSM-SV-Deploy@f1639b120bc52e6535bc7e80fefafd282a4290cb # v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: "22"
          user: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source_path: server
          target_path: /Users/snowykte0426/deploy/nxdi
          deployspec_path: server/deploy/deployspec.yml

      - name: Remove runtime environment
        if: always()
        shell: bash
        run: rm -f server/runtime.env
