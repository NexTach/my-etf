name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    env:
      API_ORIGIN: https://kimtaeeun.site/nxdi-api
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Verify
        working-directory: client
        run: npm run verify

      - name: Build
        working-directory: client
        run: npm run build

  server:
    name: Server
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:password@127.0.0.1:3306/nxdi
      APP_SESSION_SECRET: test-session-secret-with-at-least-32-characters
      PUBLIC_APP_URL: https://nxdi.vercel.app
      PORT: "3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        working-directory: server
        run: npm ci

      - name: Verify
        working-directory: server
        run: npm run verify

      - name: Build
        working-directory: server
        run: npm run build
