name: nxdi

services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: nxdi-server:latest
    container_name: nxdi-server
    init: true
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:10104:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    stop_grace_period: 30s
